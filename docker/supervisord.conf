[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1920x1080x24
autorestart=true
priority=100

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":99"
autorestart=true
priority=200
depends_on=xvfb

[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -shared -nopw -rfbport 5900
autorestart=true
priority=300
depends_on=xvfb

[program:novnc]
command=bash -c "websockify --web=/usr/share/novnc 6080 localhost:5900"
autorestart=true
priority=400
depends_on=x11vnc

[program:chrome]
command=/usr/bin/google-chrome-stable --remote-debugging-port=9222 --user-data-dir=/chrome-data --no-first-run --disable-gpu --window-size=1920,1080
environment=DISPLAY=":99"
autorestart=true
priority=500
startretries=10
startsecs=5
depends_on=xvfb

[program:api]
command=/usr/local/bin/pnpm run server
directory=/app
autorestart=true
priority=600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
