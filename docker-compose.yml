services:
  maps-organizer:
    image: ghcr.io/arjenvandenheuvel/google-maps-list-organizer:latest
    # build: .  # Uncomment to build locally instead of pulling image
    container_name: maps-organizer
    ports:
      # noVNC web interface - access Chrome browser here
      - "6080:6080"
      # Web API for triggering extract/move
      - "3001:3001"
    volumes:
      # Persist Chrome profile (Google login session)
      - chrome-data:/chrome-data
      # Persist tmp data (places.json, progress, etc.)
      - maps-tmp:/app/tmp
      # Blackhole inbox - drop JSON files here to add places
      - maps-blackhole:/app/blackhole
      # Master locations file - tracks all added places for dedup
      - maps-master:/app/data
    environment:
      # Set a token for API authentication (change this!)
      - API_TOKEN=${API_TOKEN:-changeme}
      # Display for Chrome
      - DISPLAY=:99
      # Path for master locations file (inside maps-master volume)
      - MASTER_FILE=/app/data/master-locations.json
    restart: unless-stopped

volumes:
  chrome-data:
  maps-tmp:
  maps-blackhole:
  maps-master:
